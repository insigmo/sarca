volumes:
  sarca-db-volume:
    name: sarca-db-volume
  sarca-work-volume:
    name: sarca-work-volume
  telegram-bot-api-data:
    name: telegram-bot-api-data

networks:
  sarca-network:
    name: sarca-network

services:
  sarca:
    container_name: sarca
    image: ghcr.io/insigmo/sarca:latest
    build:
      context: .
      dockerfile: Dockerfile.amd64
      args:
        VERSION: latest
    entrypoint: ["/bin/sh", "/sarca-entrypoint.sh"]
    volumes:
      # App reads KEY=VALUE from this file (same format as native install).
      - ./sarca.conf:/sarca.conf:ro
      - ./docker/sarca-entrypoint.sh:/sarca-entrypoint.sh:ro
      # Local builds override release assets in the image (task binary / task ui).
      - ./runtime/sarca:/sarca:ro
      - ./ui/dist:/ui:ro
      - sarca-work-volume:/work
      # Local Bot API (`--local`) returns absolute paths under this dir; Sarca must
      # see the same files to open/download without a second HTTP hop.
      - telegram-bot-api-data:/var/lib/telegram-bot-api:ro
    environment:
      # Docker network layout — overrides host-oriented values in mounted conf.
      # PORT is taken from sarca.conf via `docker compose --env-file sarca.conf`
      # so the published host port matches the process listen port.
      # TELEGRAM_* (local Bot API URL, chunk size, …) come from mounted sarca.conf —
      # do not hardcode them here or they permanently override the conf file.
      PORT: ${PORT:-8000}
      DATABASE_HOST: db
      WORK_DIR: /work
    ports:
      - "${PORT:-8000}:${PORT:-8000}"
    restart: unless-stopped
    depends_on:
      - db
      - telegram-bot-api
    networks:
      - sarca-network

  telegram-bot-api:
    container_name: telegram-bot-api
    image: aiogram/telegram-bot-api:latest
    volumes:
      - ./sarca.conf:/sarca.conf:ro
      - ./docker/telegram-bot-api-entrypoint.sh:/sarca-telegram-entrypoint.sh:ro
      - telegram-bot-api-data:/var/lib/telegram-bot-api
    environment:
      TELEGRAM_LOCAL: "1"
      # Must be present in the process env (server reads them directly).
      # Interpolated from `docker compose --env-file sarca.conf`.
      TELEGRAM_API_ID: ${TELEGRAM_API_ID:?set TELEGRAM_API_ID in sarca.conf}
      TELEGRAM_API_HASH: ${TELEGRAM_API_HASH:?set TELEGRAM_API_HASH in sarca.conf}
    entrypoint: ["/bin/sh", "/sarca-telegram-entrypoint.sh"]
    restart: unless-stopped
    ports:
      - "8081:8081"
    networks:
      - sarca-network

  db:
    container_name: sarca_db
    image: postgres:15.0-alpine
    # Keep in sync with DATABASE_* in sarca.conf (example defaults).
    environment:
      POSTGRES_USER: sarca
      POSTGRES_PASSWORD: sarca
      POSTGRES_DB: sarca
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready --username=sarca --dbname=sarca"]
      interval: 10s
      timeout: 5s
      retries: 10
    volumes:
      - sarca-db-volume:/var/lib/postgresql/data
    networks:
      - sarca-network
