version: "3"

vars:
  NATIVE_PREFIX:
    sh: 'echo "${HOME}/.local/share/sarca"'
  # Compose interpolates ${PORT} from sarca.conf (host publish + container listen).
  COMPOSE: docker compose --env-file sarca.conf

tasks:
  default:
    desc: Show available tasks
    cmds:
      - task --list-all
    silent: true

  ui:
    desc: Build web UI into ui/dist
    cmds:
      - |
        UI_DIR="{{.ROOT_DIR}}/ui"
        build() {
          (cd "$UI_DIR" && VITE_API_BASE=/api pnpm install && VITE_API_BASE=/api pnpm run build)
        }
        if command -v pnpm >/dev/null 2>&1; then
          build
        elif bash -lc 'command -v pnpm' >/dev/null 2>&1; then
          bash -lc "cd \"$UI_DIR\" && VITE_API_BASE=/api pnpm install && VITE_API_BASE=/api pnpm run build"
        else
          echo "error: pnpm not found" >&2
          exit 1
        fi

  binary:
    desc: Lint (fmt+clippy) then build release binary into runtime/sarca
    deps: [lint]
    cmds:
      - mkdir -p "{{.ROOT_DIR}}/runtime"
      - |
        cd "{{.ROOT_DIR}}/sarca"
        cargo build --release
        BIN="$(cargo metadata --format-version 1 --no-deps 2>/dev/null | sed -n 's/.*"target_directory":"\([^"]*\)".*/\1/p')"
        if [ -z "$BIN" ]; then BIN=target; fi
        SRC="$BIN/release/sarca"
        DEST="{{.ROOT_DIR}}/runtime/sarca"
        if cp -f "$SRC" "$DEST" 2>/dev/null; then
          chmod +x "$DEST"
        else
          # runtime/sarca may be root-owned from a prior Docker copy
          docker run --rm \
            -v "{{.ROOT_DIR}}/runtime:/runtime" \
            -v "$SRC:/bin-src:ro" \
            alpine sh -c 'cp /bin-src /runtime/sarca && chmod 755 /runtime/sarca'
        fi
        echo "binary → $DEST"

  lint:
    desc: Strict rustfmt (nightly) + clippy (deny pedantic/nursery/cargo)
    dir: sarca
    cmds:
      - cargo +nightly fmt -- --check
      - cargo clippy --all-targets --all-features -- -D warnings

  fmt:
    desc: Apply strict rustfmt (nightly unstable options)
    dir: sarca
    cmds:
      - cargo +nightly fmt

  deploy-ui-native:
    desc: Copy ui/dist into native install prefix
    deps: [ui]
    cmds:
      - |
        PREFIX="{{.NATIVE_PREFIX}}"
        mkdir -p "$PREFIX/ui"
        rm -rf "$PREFIX/ui"/*
        cp -a "{{.ROOT_DIR}}/ui/dist/." "$PREFIX/ui/"
        echo "native UI → $PREFIX/ui"

  deploy-native:
    desc: Install local binary + UI into ~/.local/share/sarca
    deps: [binary, deploy-ui-native]
    cmds:
      - |
        PREFIX="{{.NATIVE_PREFIX}}"
        mkdir -p "$PREFIX"
        cp -f "{{.ROOT_DIR}}/runtime/sarca" "$PREFIX/sarca"
        chmod +x "$PREFIX/sarca"
        echo "native binary → $PREFIX/sarca"

  up:
    desc: Build binary+UI and start Docker stack
    deps: [ui, binary]
    cmds:
      - chmod +x "{{.ROOT_DIR}}/docker/sarca-entrypoint.sh" "{{.ROOT_DIR}}/docker/telegram-bot-api-entrypoint.sh"
      - test -x "{{.ROOT_DIR}}/runtime/sarca"
      - test -f "{{.ROOT_DIR}}/ui/dist/index.html"
      - test -f "{{.ROOT_DIR}}/sarca.conf"
      - "{{.COMPOSE}} up -d --build --force-recreate --remove-orphans"

  down:
    desc: Stop and remove stack
    cmds:
      - "{{.COMPOSE}} down"

  restart:
    desc: Restart stack with fresh binary+UI
    cmds:
      - task: down
      - task: up

  smoke:
    desc: Upload sample image+video against running API (SARCA_BASE_URL)
    cmds:
      - |
        cd "{{.ROOT_DIR}}"
        if [ ! -d .venv ]; then python3 -m venv .venv; .venv/bin/pip install -r e2e/requirements.txt; fi
        PORT="$(grep -E '^[[:space:]]*PORT=' sarca.conf 2>/dev/null | head -1 | cut -d= -f2- | tr -d '[:space:]')"
        PORT="${PORT:-8000}"
        env -u SUPERUSER_EMAIL -u SUPERUSER_PASS \
          SARCA_BASE_URL="${SARCA_BASE_URL:-http://127.0.0.1:${PORT}}" \
          .venv/bin/python -m pytest -q -m smoke e2e/test_upload_smoke.py -s
