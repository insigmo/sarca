volumes:
  sarca-db-volume:
    name: sarca-db-volume
  sarca-work-volume:
    name: sarca-work-volume
  telegram-bot-api-data:
    name: telegram-bot-api-data

networks:
  sarca-network:
    name: sarca-network

services:
  sarca:
    container_name: sarca
    image: ghcr.io/insigmo/sarca:latest
    env_file:
      - .env
    ports:
      - ${PORT}:8000
    restart: unless-stopped
    depends_on:
      - db
      - telegram-bot-api
    volumes:
      - sarca-work-volume:/work
      - telegram-bot-api-data:/var/lib/telegram-bot-api:ro
    networks:
      - sarca-network

  telegram-bot-api:
    container_name: telegram-bot-api
    image: aiogram/telegram-bot-api:latest
    environment:
      TELEGRAM_API_ID: ${TELEGRAM_API_ID}
      TELEGRAM_API_HASH: ${TELEGRAM_API_HASH}
      TELEGRAM_LOCAL: 1
    restart: unless-stopped
    ports:
      - ${TELEGRAM_BOT_API_PORT:-8081}:8081
    volumes:
      - telegram-bot-api-data:/var/lib/telegram-bot-api
    networks:
      - sarca-network

  db:
    container_name: sarca_db
    image: postgres:15.0-alpine
    environment:
      POSTGRES_USER: ${DATABASE_USER}
      POSTGRES_PASSWORD: ${DATABASE_PASSWORD}
    ports:
      - "5432:5432"
    restart: unless-stopped
    healthcheck:
      test: pg_isready --username=${DATABASE_USER} --dbname=${DATABASE_NAME}
      interval: 10s
      timeout: 5s
      retries: 10
    volumes:
      - sarca-db-volume:/var/lib/postgresql/data
    networks:
      - sarca-network
