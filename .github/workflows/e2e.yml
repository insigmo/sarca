name: E2E API tests

on:
  push:
    branches: ["master", "main"]
  pull_request:
  workflow_call:

permissions:
  contents: read

jobs:
  e2e:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: sarca
          POSTGRES_PASSWORD: sarca
          POSTGRES_DB: sarca
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U sarca -d sarca"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    env:
      PORT: "8000"
      WORKERS: "2"
      CHANNEL_CAPACITY: "8"
      SUPERUSER_EMAIL: e2e@sarca.test
      SUPERUSER_PASS: e2e-password
      ACCESS_TOKEN_EXPIRE_IN_SECS: "1800"
      REFRESH_TOKEN_EXPIRE_IN_DAYS: "14"
      SECRET_KEY: e2e-secret-key-for-ci-only-not-production
      TELEGRAM_LOCAL_API: "false"
      TELEGRAM_API_BASE_URL: https://api.telegram.org
      TELEGRAM_RATE_LIMIT: "18"
      TELEGRAM_CHUNK_SIZE_MB: "20"
      WORK_DIR: ${{ github.workspace }}/work
      DATABASE_USER: sarca
      DATABASE_PASSWORD: sarca
      DATABASE_NAME: sarca
      DATABASE_HOST: 127.0.0.1
      DATABASE_PORT: "5432"
      SARCA_BASE_URL: http://127.0.0.1:8000
      CARGO_TERM_COLOR: always

    steps:
      - uses: actions/checkout@v5

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: sarca -> target

      - uses: pnpm/action-setup@v6
        with:
          version: 9

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: ui/pnpm-lock.yaml

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: e2e/requirements.txt

      - name: Build UI
        working-directory: ui
        env:
          VITE_API_BASE: /api
        run: |
          pnpm install --frozen-lockfile
          pnpm run build

      - name: Build server
        working-directory: sarca
        run: cargo build --release

      - name: Prepare runtime dir
        run: |
          mkdir -p "$WORK_DIR" runtime/ui
          cp -a ui/dist/. runtime/ui/
          cp sarca/target/release/sarca runtime/sarca
          chmod +x runtime/sarca

      - name: Start server
        working-directory: runtime
        run: |
          ./sarca >"$GITHUB_WORKSPACE/server.log" 2>&1 &
          echo $! >"$GITHUB_WORKSPACE/server.pid"

      - name: Install e2e deps
        run: pip install -r e2e/requirements.txt

      - name: Run e2e tests
        run: pytest -q e2e/

      - name: Dump server log on failure
        if: failure()
        run: cat "$GITHUB_WORKSPACE/server.log" || true

      - name: Stop server
        if: always()
        run: kill "$(cat "$GITHUB_WORKSPACE/server.pid")" 2>/dev/null || true
