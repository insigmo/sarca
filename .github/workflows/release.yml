name: Release binaries

# Auto-release on every push to master (patch bump), or manually with a bump type.
# Manual tags (v*) still work. Version in Cargo.toml / package.json is updated by CI.
on:
  push:
    branches: ["master"]
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      bump:
        description: "Semver bump when releasing from a branch"
        type: choice
        options: [patch, minor, major]
        default: patch

permissions:
  contents: write
  packages: write

jobs:
  # Skip auto-release for the bot commit that only bumps version files.
  guard:
    runs-on: ubuntu-latest
    outputs:
      proceed: ${{ steps.check.outputs.proceed }}
    steps:
      - uses: actions/checkout@v5
      - id: check
        run: |
          set -euo pipefail
          if [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
            echo "proceed=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          if git log -1 --pretty=%s | grep -qE '^chore: release v'; then
            echo "proceed=false" >> "$GITHUB_OUTPUT"
            echo "Skipping version-bump commit"
            exit 0
          fi
          echo "proceed=true" >> "$GITHUB_OUTPUT"

  e2e:
    needs: [guard]
    if: needs.guard.outputs.proceed == 'true'
    uses: ./.github/workflows/e2e.yml

  version:
    needs: [guard, e2e]
    if: needs.guard.outputs.proceed == 'true'
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.meta.outputs.tag }}
      version: ${{ steps.meta.outputs.version }}
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Resolve next version
        id: meta
        env:
          BUMP: ${{ github.event_name == 'workflow_dispatch' && inputs.bump || 'patch' }}
        run: |
          set -euo pipefail

          # Tag push: use the tag as-is, do not bump or commit.
          if [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
            TAG="${GITHUB_REF_NAME}"
            VERSION="${TAG#v}"
            echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
            echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
            echo "Using existing tag ${TAG}"
            exit 0
          fi

          LATEST="$(git tag -l 'v*' --sort=-v:refname | head -1 || true)"
          if [[ -z "${LATEST}" ]]; then
            MAJOR=0; MINOR=0; PATCH=0
          else
            RAW="${LATEST#v}"
            IFS=. read -r MAJOR MINOR PATCH <<<"${RAW}"
            MAJOR=${MAJOR:-0}; MINOR=${MINOR:-0}; PATCH=${PATCH:-0}
          fi

          case "${BUMP}" in
            major) MAJOR=$((MAJOR + 1)); MINOR=0; PATCH=0 ;;
            minor) MINOR=$((MINOR + 1)); PATCH=0 ;;
            patch) PATCH=$((PATCH + 1)) ;;
            *) echo "Unknown bump: ${BUMP}" >&2; exit 1 ;;
          esac

          VERSION="${MAJOR}.${MINOR}.${PATCH}"
          TAG="v${VERSION}"

          if git rev-parse "${TAG}" >/dev/null 2>&1; then
            echo "Tag ${TAG} already exists" >&2
            exit 1
          fi

          # Keep package manifests in sync with the release tag.
          sed -i "s/^version = \".*\"/version = \"${VERSION}\"/" sarca/Cargo.toml
          python3 - <<PY
          import json, pathlib
          path = pathlib.Path("ui/package.json")
          data = json.loads(path.read_text())
          data["version"] = "${VERSION}"
          path.write_text(json.dumps(data, indent=2) + "\n")
          PY

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add sarca/Cargo.toml ui/package.json
          git commit -m "chore: release ${TAG}"
          git tag "${TAG}"
          git push origin HEAD:"${GITHUB_REF_NAME}"
          git push origin "${TAG}"

          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "Prepared ${TAG} (bump=${BUMP}, previous=${LATEST:-none})"

  build-ui:
    needs: [version]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          ref: ${{ needs.version.outputs.tag }}

      - uses: pnpm/action-setup@v6
        with:
          version: 9

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: ui/pnpm-lock.yaml

      - name: Build UI
        working-directory: ui
        env:
          VITE_API_BASE: /api
        run: |
          pnpm install --frozen-lockfile
          pnpm run build

      - uses: actions/upload-artifact@v6
        with:
          name: ui-dist
          path: ui/dist
          retention-days: 1

  build:
    needs: [version, build-ui]
    strategy:
      fail-fast: false
      matrix:
        include:
          # Pin Linux to 22.04 so release binaries need GLIBC ≤ 2.35 and run on
          # Bookworm/older hosts; ubuntu-latest (24.04) would require GLIBC 2.39.
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-22.04
            archive: tar.gz
            asset: sarca_linux_amd64
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-22.04
            archive: tar.gz
            asset: sarca_linux_arm64
            cross: true
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            archive: zip
            asset: sarca_windows_amd64
            binary: sarca.exe
          - target: aarch64-apple-darwin
            os: macos-14
            archive: tar.gz
            asset: sarca_macos_arm64

    runs-on: ${{ matrix.os }}
    defaults:
      run:
        shell: bash

    steps:
      - uses: actions/checkout@v5
        with:
          ref: ${{ needs.version.outputs.tag }}

      - uses: actions/download-artifact@v7
        with:
          name: ui-dist
          path: package/ui

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install Linux aarch64 cross linker
        if: matrix.cross
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu

      - name: Build release binary
        working-directory: sarca
        env:
          CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER: aarch64-linux-gnu-gcc
        run: cargo build --release --target ${{ matrix.target }}

      - name: Package artifact
        env:
          TARGET: ${{ matrix.target }}
          ASSET: ${{ matrix.asset }}
          ARCHIVE: ${{ matrix.archive }}
          BINARY_NAME: ${{ matrix.binary || 'sarca' }}
        run: |
          set -euo pipefail
          mkdir -p "dist/${ASSET}"
          cp "sarca/target/${TARGET}/release/${BINARY_NAME}" "dist/${ASSET}/"
          cp -r package/ui "dist/${ASSET}/ui"
          cd dist
          if [ "${ARCHIVE}" = "zip" ]; then
            if command -v zip >/dev/null; then
              zip -r "${ASSET}.zip" "${ASSET}"
            else
              powershell.exe -NoProfile -Command "Compress-Archive -Path '${ASSET}' -DestinationPath '${ASSET}.zip'"
            fi
            ARTIFACT="${ASSET}.zip"
          else
            tar -czf "${ASSET}.tar.gz" "${ASSET}"
            ARTIFACT="${ASSET}.tar.gz"
          fi
          if command -v sha256sum >/dev/null; then
            sha256sum "${ARTIFACT}" > "${ARTIFACT}.sha256"
          else
            shasum -a 256 "${ARTIFACT}" > "${ARTIFACT}.sha256"
          fi
          echo "Packed ${ARTIFACT}"

      - uses: actions/upload-artifact@v6
        with:
          name: ${{ matrix.asset }}
          path: |
            dist/${{ matrix.asset }}.${{ matrix.archive }}
            dist/${{ matrix.asset }}.${{ matrix.archive }}.sha256
          if-no-files-found: error
          retention-days: 1

  release:
    needs: [version, build]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v7
        with:
          path: artifacts
          pattern: sarca_*
          merge-multiple: true

      - name: Assert release archives present
        run: |
          set -euo pipefail
          find artifacts -type f | sort
          count="$(find artifacts -type f \( -name 'sarca_*.tar.gz' -o -name 'sarca_*.zip' \) | wc -l)"
          echo "archives=$count"
          test "$count" -ge 4

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.version.outputs.tag }}
          name: ${{ needs.version.outputs.tag }}
          prerelease: false
          generate_release_notes: true
          fail_on_unmatched_files: true
          body: |
            Multi-platform binaries for `${{ needs.version.outputs.tag }}` (each archive = `sarca` + `ui/`).

            **Install (Linux / macOS)**
            ```bash
            curl -fsSL https://raw.githubusercontent.com/insigmo/sarca/refs/heads/master/install.sh | bash
            ```

            **Install (Windows PowerShell)**
            ```powershell
            irm https://raw.githubusercontent.com/insigmo/sarca/refs/heads/master/install.ps1 | iex
            ```

            **Docker**
            ```bash
            curl -fsSL https://raw.githubusercontent.com/insigmo/sarca/refs/heads/master/install.sh | bash -s -- --docker
            cd sarca && docker compose up -d
            ```

            Image: `ghcr.io/insigmo/sarca:${{ needs.version.outputs.tag }}` (also `:latest`).
            Postgres is required — see README.
          files: artifacts/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # GITHUB_TOKEN cannot trigger other workflows on release:published — call Docker directly.
  docker:
    needs: [version, release]
    uses: ./.github/workflows/docker-image.yml
    with:
      version: ${{ needs.version.outputs.tag }}
    secrets: inherit
