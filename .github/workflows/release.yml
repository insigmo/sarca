name: Release binaries

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write
  packages: write

jobs:
  e2e:
    uses: ./.github/workflows/e2e.yml

  build-ui:
    needs: [e2e]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: pnpm/action-setup@v6
        with:
          version: 8

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: ui/pnpm-lock.yaml

      - name: Build UI
        working-directory: ui
        env:
          VITE_API_BASE: /api
        run: |
          pnpm install --frozen-lockfile
          pnpm run build

      - uses: actions/upload-artifact@v6
        with:
          name: ui-dist
          path: ui/dist
          retention-days: 1

  build:
    needs: [e2e, build-ui]
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            archive: tar.gz
            asset: sarca_linux_amd64
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            archive: tar.gz
            asset: sarca_linux_arm64
            cross: true
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            archive: zip
            asset: sarca_windows_amd64
            binary: sarca.exe
          - target: aarch64-apple-darwin
            os: macos-14
            archive: tar.gz
            asset: sarca_macos_arm64

    runs-on: ${{ matrix.os }}
    defaults:
      run:
        shell: bash

    steps:
      - uses: actions/checkout@v5

      - uses: actions/download-artifact@v7
        with:
          name: ui-dist
          path: package/ui

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install Linux aarch64 cross linker
        if: matrix.cross
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu

      - name: Build release binary
        working-directory: sarca
        env:
          CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER: aarch64-linux-gnu-gcc
        run: cargo build --release --target ${{ matrix.target }}

      - name: Package artifact
        env:
          TARGET: ${{ matrix.target }}
          ASSET: ${{ matrix.asset }}
          ARCHIVE: ${{ matrix.archive }}
          BINARY_NAME: ${{ matrix.binary || 'sarca' }}
        run: |
          set -euo pipefail
          mkdir -p "dist/${ASSET}"
          cp "sarca/target/${TARGET}/release/${BINARY_NAME}" "dist/${ASSET}/"
          cp -r package/ui "dist/${ASSET}/ui"
          cd dist
          if [ "${ARCHIVE}" = "zip" ]; then
            if command -v zip >/dev/null; then
              zip -r "${ASSET}.zip" "${ASSET}"
            else
              powershell.exe -NoProfile -Command "Compress-Archive -Path '${ASSET}' -DestinationPath '${ASSET}.zip'"
            fi
            ARTIFACT="${ASSET}.zip"
          else
            tar -czf "${ASSET}.tar.gz" "${ASSET}"
            ARTIFACT="${ASSET}.tar.gz"
          fi
          if command -v sha256sum >/dev/null; then
            sha256sum "${ARTIFACT}" > "${ARTIFACT}.sha256"
          else
            shasum -a 256 "${ARTIFACT}" > "${ARTIFACT}.sha256"
          fi
          echo "Packed ${ARTIFACT}"

      - uses: actions/upload-artifact@v6
        with:
          name: ${{ matrix.asset }}
          path: |
            dist/${{ matrix.asset }}.${{ matrix.archive }}
            dist/${{ matrix.asset }}.${{ matrix.archive }}.sha256
          if-no-files-found: error
          retention-days: 1

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v7
        with:
          path: artifacts
          pattern: sarca_*
          merge-multiple: true

      - name: Assert release archives present
        run: |
          set -euo pipefail
          find artifacts -type f | sort
          count="$(find artifacts -type f \( -name 'sarca_*.tar.gz' -o -name 'sarca_*.zip' \) | wc -l)"
          echo "archives=$count"
          test "$count" -ge 4

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          prerelease: false
          generate_release_notes: true
          fail_on_unmatched_files: true
          body: |
            Multi-platform binaries for `${{ github.ref_name }}` (each archive = `sarca` + `ui/`).

            **Install (Linux / macOS)**
            ```bash
            curl -fsSL https://raw.githubusercontent.com/insigmo/sarca/refs/heads/master/install.sh | bash
            ```

            **Install (Windows PowerShell)**
            ```powershell
            irm https://raw.githubusercontent.com/insigmo/sarca/refs/heads/master/install.ps1 | iex
            ```

            **Docker**
            ```bash
            curl -fsSL https://raw.githubusercontent.com/insigmo/sarca/refs/heads/master/install.sh | bash -s -- --docker
            cd sarca && docker compose up -d
            ```

            Image: `ghcr.io/insigmo/sarca:${{ github.ref_name }}` (also `:latest`).
            Postgres is required — see README.
          files: artifacts/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # GITHUB_TOKEN cannot trigger other workflows on release:published — call Docker directly.
  docker:
    needs: release
    uses: ./.github/workflows/docker-image.yml
    with:
      version: ${{ github.ref_name }}
    secrets: inherit
