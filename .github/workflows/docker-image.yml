name: Docker Image CI

# Builds multi-arch images from GitHub Release assets and pushes to GHCR.
# Called from the release workflow (release events from GITHUB_TOKEN do not
# start other workflows). Also runnable manually for an existing tag.
on:
  workflow_call:
    inputs:
      version:
        description: "Release tag to package (e.g. v0.0.6)"
        required: true
        type: string
  workflow_dispatch:
    inputs:
      version:
        description: "Release tag to package (e.g. v0.0.6)"
        required: true
        type: string

env:
  REGISTRY: ghcr.io

jobs:
  build_n_push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: amd64
            platform: linux/amd64
            dockerfile: Dockerfile.amd64
          - arch: arm64
            platform: linux/arm64
            dockerfile: Dockerfile.arm64

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Resolve version and image name
        id: meta
        run: |
          TAG="${{ inputs.version }}"
          # GHCR requires lowercase image names
          IMAGE="${REGISTRY}/$(echo '${{ github.repository }}' | tr '[:upper:]' '[:lower:]')"
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
          echo "image=${IMAGE}" >> "$GITHUB_OUTPUT"
          echo "package=$(echo '${{ github.event.repository.name }}' | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_OUTPUT"

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push (${{ matrix.arch }})
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          platforms: ${{ matrix.platform }}
          push: true
          build-args: |
            VERSION=${{ steps.meta.outputs.tag }}
            GITHUB_REPO=${{ github.repository }}
          labels: |
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
            org.opencontainers.image.version=${{ steps.meta.outputs.tag }}
            org.opencontainers.image.title=sarca
          tags: |
            ${{ steps.meta.outputs.image }}:${{ steps.meta.outputs.tag }}-${{ matrix.arch }}
          cache-from: type=gha,scope=docker-${{ matrix.arch }}
          cache-to: type=gha,mode=max,scope=docker-${{ matrix.arch }}

  manifest:
    needs: build_n_push
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Resolve version and image name
        id: meta
        run: |
          TAG="${{ inputs.version }}"
          IMAGE="${REGISTRY}/$(echo '${{ github.repository }}' | tr '[:upper:]' '[:lower:]')"
          PKG="$(echo '${{ github.event.repository.name }}' | tr '[:upper:]' '[:lower:]')"
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
          echo "image=${IMAGE}" >> "$GITHUB_OUTPUT"
          echo "package=${PKG}" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Create multi-arch manifest
        env:
          TAG: ${{ steps.meta.outputs.tag }}
          IMAGE: ${{ steps.meta.outputs.image }}
        run: |
          docker buildx imagetools create \
            -t "${IMAGE}:${TAG}" \
            -t "${IMAGE}:latest" \
            "${IMAGE}:${TAG}-amd64" \
            "${IMAGE}:${TAG}-arm64"

      - name: Make GHCR package public
        env:
          # Optional PAT with write:packages — GITHUB_TOKEN often cannot change visibility.
          GH_TOKEN: ${{ secrets.PACKAGES_TOKEN != '' && secrets.PACKAGES_TOKEN || github.token }}
          OWNER: ${{ github.repository_owner }}
          PACKAGE: ${{ steps.meta.outputs.package }}
        run: |
          set -uo pipefail
          api() {
            curl -sS -o /tmp/pkg-vis.json -w "%{http_code}" \
              -X PUT \
              -H "Authorization: Bearer ${GH_TOKEN}" \
              -H "Accept: application/vnd.github+json" \
              -H "X-GitHub-Api-Version: 2022-11-28" \
              "$1" \
              -d '{"visibility":"public"}'
          }
          # Personal account packages use /user/... ; orgs use /orgs/{org}/...
          CODE=$(api "https://api.github.com/user/packages/container/${PACKAGE}/visibility" || true)
          if [ "${CODE}" != "204" ] && [ "${CODE}" != "200" ]; then
            CODE=$(api "https://api.github.com/orgs/${OWNER}/packages/container/${PACKAGE}/visibility" || true)
          fi
          # Some accounts accept PATCH on the package resource instead
          if [ "${CODE}" != "204" ] && [ "${CODE}" != "200" ]; then
            CODE=$(curl -sS -o /tmp/pkg-vis.json -w "%{http_code}" \
              -X PATCH \
              -H "Authorization: Bearer ${GH_TOKEN}" \
              -H "Accept: application/vnd.github+json" \
              "https://api.github.com/user/packages/container/${PACKAGE}" \
              -d '{"visibility":"public"}' || true)
          fi
          echo "visibility API HTTP ${CODE}"
          cat /tmp/pkg-vis.json 2>/dev/null || true
          if [ "${CODE}" = "204" ] || [ "${CODE}" = "200" ]; then
            echo "Package ${OWNER}/${PACKAGE} is public."
          else
            echo "::warning::Could not set package visibility via API (HTTP ${CODE})."
            echo "::warning::One-time: Package settings → Change visibility → Public"
            echo "::warning::Or add repo secret PACKAGES_TOKEN (classic PAT: write:packages)."
          fi
